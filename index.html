<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bridge Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent: #00ff88; --accent2: #0088ff; --text: #e0e0f0; --muted: #555570; --danger: #ff4466; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .header { text-align: center; margin-bottom: 10px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: block; }
  .wallet-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
  .wallet-item:hover { background: rgba(255,255,255,0.08); }
  .wallet-item.selected { border-color: var(--accent); background: rgba(0,255,136,0.1); }
  .wallet-item img { width: 28px; height: 28px; border-radius: 6px; }
  button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; margin-top: 10px; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 12px; font-family: inherit; font-size: 11px; min-height: 60px; margin-top: 10px; resize: none; }
  .log { font-size: 10px; color: var(--muted); max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-family: monospace; line-height: 1.4; }
  .pending-box { display: none; background: rgba(0,255,136,0.05); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; }
  .relay-status { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 5px; }
</style>
</head>
<body>

  <div class="container">
  <div class="header">
    <h1>Spell Bridge Pro</h1>
    <p style="font-size: 10px; color: var(--muted);">BNB Chain Optimized Relay</p>
  </div>

  <div id="relay-msg" class="relay-status">Relay: Disconnected</div>

  <div class="card">
    <span class="card-label">Step 1: Select Wallet</span>
    <div id="wallet-list">Scanning...</div>
    <div id="connection-status" style="font-size: 12px; color: var(--accent); margin-top: 8px;"></div>
  </div>

  <div class="card">
    <span class="card-label">Step 2: Connect dApp</span>
    <textarea id="wc-uri" placeholder="Paste wc: link..."></textarea>
    <button id="btn-pair" disabled>Initialize Bridge</button>
  </div>

  <!-- ENHANCED PENDING BOX -->
  <div id="pending-box" class="pending-box" style="display:none; background: #1a1a25; border: 1px solid var(--accent2);">
    <div style="color: var(--accent2); font-weight: bold; margin-bottom: 10px; font-size: 12px; border-bottom: 1px solid #333; padding-bottom: 5px;">INCOMING REQUEST</div>
    
    <div id="req-method" style="font-size: 16px; color: white; margin-bottom: 10px; font-weight: bold;"></div>
    
    <!-- TRANSACTION INSPECTOR -->
    <div id="tx-details" style="background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #aaa; margin-bottom: 15px; border: 1px solid #222;">
        <div style="display:flex; justify-content: space-between;"><span>Value:</span> <span id="view-value" style="color:white;">-</span></div>
        <div style="display:flex; justify-content: space-between;"><span>Gas Limit:</span> <span id="view-gas" style="color:white;">-</span></div>
        <div style="display:flex; justify-content: space-between;"><span>Gas Price:</span> <span id="view-price" style="color:white;">-</span></div>
        <hr style="border:0; border-top:1px solid #222; margin: 8px 0;">
        <div style="display:flex; justify-content: space-between; font-weight: bold;"><span>Max Fee:</span> <span id="view-total" style="color:var(--accent);">0.00 BNB</span></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button id="btn-approve" style="background: var(--accent2); color: white; border: none;">Approve</button>
      <button id="btn-reject" style="border-color: var(--danger); color: var(--danger);">Reject</button>
    </div>
  </div>

  <div class="card">
    <span class="card-label">Activity Log</span>
    <div id="log" class="log"></div>
  </div>
</div>

<script type="module">
  import { Core } from "https://esm.sh/@walletconnect/core@2.10.3";
  import { Web3Wallet } from "https://esm.sh/@walletconnect/web3wallet@1.9.3";

  const PROJECT_ID = '86694c6d7377473e04f5ef5e714e12ed';
  let selectedProvider = null, account = null, wcClient = null, pendingRequest = null, providers = [];

  function log(msg, color = '') {
    const el = document.getElementById('log');
    const div = document.createElement('div');
    if(color) div.style.color = color;
    div.textContent = > ${msg};
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function hexToDecimal(hex) { return parseInt(hex, 16); }
  function hexToBnb(hex) { 
    if(!hex  hex === '0x'  hex === '0x0') return "0";
    return (parseInt(hex, 16) / 1e18).toFixed(6); 
  }

  // --- Discovery ---
  window.addEventListener("eip6963:announceProvider", (e) => {
    if (providers.find(p => p.info.uuid === e.detail.info.uuid)) return;
    providers.push({ info: e.detail.info, provider: e.detail.provider });
    updateWalletList();
  });
  window.dispatchEvent(new Event("eip6963:requestProvider"));

  function updateWalletList() {
    const listEl = document.getElementById('wallet-list');
    listEl.innerHTML = '';
    providers.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'wallet-item';
      div.innerHTML = <img src="${item.info.icon}"> <div>${item.info.name}</div>;
      div.onclick = () => selectWallet(index);
      listEl.appendChild(div);
    });
  }
  
  async function selectWallet(index) {
    selectedProvider = providers[index].provider;
    const accounts = await selectedProvider.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    document.getElementById('connection-status').textContent = Connected: ${account};
    document.getElementById('btn-pair').disabled = false;
    log("Spell Wallet Linked", "var(--accent)");
  }

  // --- WC Core ---
  async function init() {
    const core = new Core({ projectId: PROJECT_ID });
    wcClient = await Web3Wallet.init({ core, metadata: { name: 'Spell Pro Bridge', url: window.location.origin, icons: [] }});

    core.relayer.on("relayer_connect", () => { document.getElementById('relay-msg').textContent = "Relay: Connected ✓"; });

    wcClient.on('session_proposal', async (p) => {
        const chains = p.params.requiredNamespaces?.eip155?.chains || ['eip155:56'];
        const namespaces = { eip155: { accounts: chains.map(c => ${c}:${account}), methods: ['eth_sendTransaction', 'personal_sign', 'eth_signTypedData_v4'], events: ['chainChanged', 'accountsChanged'], chains }};
        await wcClient.approveSession({ id: p.id, namespaces });
        log("Bridge Established", "var(--accent)");
    });

    wcClient.on('session_request', (event) => {
        pendingRequest = event;
        const req = event.params.request;
        document.getElementById('req-method').textContent = req.method;
        
        // --- DATA INSPECTOR LOGIC ---
        if (req.method === 'eth_sendTransaction') {
            const tx = req.params[0];
            const gas = tx.gas ? hexToDecimal(tx.gas) : 0;
            const price = tx.gasPrice ? (hexToDecimal(tx.gasPrice) / 1e9).toFixed(2) : "Auto";
            const val = hexToBnb(tx.value);
            
            document.getElementById('view-value').textContent = ${val} BNB;
            document.getElementById('view-gas').textContent = gas.toLocaleString();
            document.getElementById('view-price').textContent = ${price} Gwei;
            
            // Calculate Max Possible Fee
            if(tx.gas && tx.gasPrice) {
                const max = (hexToDecimal(tx.gas) * hexToDecimal(tx.gasPrice) / 1e18).toFixed(6);
                document.getElementById('view-total').textContent = ${max} BNB;
            } else {
                document.getElementById('view-total').textContent = "Estimation Required";
            }
        }

        document.getElementById('pending-box').style.display = 'block';
        log("Incoming " + req.method);
    });
  }

  async function approve() {
    try {
      const result = await selectedProvider.request({ method: pendingRequest.params.request.method, params: pendingRequest.params.request.params });
      await wcClient.respondSessionRequest({ topic: pendingRequest.topic, response: { id: pendingRequest.id, jsonrpc: '2.0', result }});
      log("Approved!", "var(--accent)");
    } catch (e) { log(e.message, "red"); }
    document.getElementById('pending-box').style.display = 'none';
  }

  document.getElementById('btn-pair').onclick = async () => {
    await wcClient.core.pairing.pair({ uri: document.getElementById('wc-uri').value.trim() });
  };
  document.getElementById('btn-approve').onclick = approve;
  document.getElementById('btn-reject').onclick = () => { document.getElementById('pending-box').style.display = 'none'; };
  
  init();
</script>
</body>
</html>
