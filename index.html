<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bridge Pro - BNB</title>

<!-- Polyfills for Mobile Compatibility -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/buffer/6.0.3/buffer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/events/3.3.0/events.min.js"></script>
<script>
    window.Buffer = window.Buffer || buffer.Buffer;
    window.process = { env: { NODE_ENV: 'production' } };
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent: #00ff88; --accent2: #0088ff; --text: #e0e0f0; --muted: #555570; --danger: #ff4466; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .header { text-align: center; margin-bottom: 10px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: block; }
  
  .wallet-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; margin-bottom: 8px; }
  .wallet-item.selected { border-color: var(--accent); background: rgba(0,255,136,0.1); }
  .wallet-item img { width: 28px; height: 28px; border-radius: 6px; }
  
  button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; margin-top: 10px; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 12px; font-family: inherit; font-size: 11px; min-height: 80px; margin-top: 10px; resize: none; }
  .log { font-size: 10px; color: var(--muted); max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-family: monospace; line-height: 1.4; }
  .pending-box { display: none; background: rgba(255,68,102,0.1); border: 1px solid var(--danger); padding: 15px; border-radius: 12px; margin-top: 15px; }
  .loader-status { font-size: 10px; text-align: center; color: var(--accent2); margin-bottom: 10px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Spell Bridge</h1>
    <p style="font-size: 10px; color: var(--muted);">BNB Chain Optimized Relay</p>
  </div>

  <div id="loader-msg" class="loader-status">Initializing Engine...</div>

  <div class="card">
    <span class="card-label">Step 1: Select Spell Wallet</span>
    <div id="wallet-list"><div style="font-size: 12px; color: var(--muted);">Scanning...</div></div>
    <div id="connection-status" style="font-size: 12px; color: var(--accent); margin-top: 8px;"></div>
  </div>

  <div class="card">
    <span class="card-label">Step 2: Connect dApp Link</span>
    <textarea id="wc-uri" placeholder="Paste wc: link here..."></textarea>
    <button id="btn-pair" onclick="startBridge()" disabled>Initialize Bridge</button>
  </div>

  <div id="pending-box" class="pending-box">
    <div style="color: var(--danger); font-weight: bold; margin-bottom: 10px;">Action Required in Spell</div>
    <div id="req-method" style="font-size: 12px; margin-bottom: 10px; color: white;"></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button onclick="approveRequest()">Approve</button>
      <button style="border-color: var(--danger); color: var(--danger);" onclick="rejectRequest()">Reject</button>
    </div>
  </div>

  <div class="card">
    <span class="card-label">Activity Log</span>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
let selectedProvider = null;
let account = null;
let wcClient = null;
let pendingRequest = null;
const providers = [];

// Global references for the engine
let CoreClass = null;
let Web3WalletClass = null;

function log(msg, color = '') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  if(color) div.style.color = color;
  div.textContent = `> ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function loadScript(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = url;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function initEngine() {
  try {
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js");
    log("Ethers Loaded");

    await loadScript("https://unpkg.com/@walletconnect/core@2.10.3/dist/index.umd.js");
    log("Core Script Loaded");

    await loadScript("https://unpkg.com/@walletconnect/web3wallet@1.9.3/dist/index.umd.js");
    log("Web3Wallet Script Loaded");

    // --- SMART DETECTION LOGIC ---
    // Some browsers put these in different places. We check all common spots.
    CoreClass = (window.WalletConnectCore && window.WalletConnectCore.Core) || (window.Core && window.Core.Core);
    Web3WalletClass = (window.WalletConnectWeb3Wallet && window.WalletConnectWeb3Wallet.Web3Wallet) || window.Web3Wallet;

    if (CoreClass && Web3WalletClass) {
      document.getElementById('loader-msg').textContent = "Engine Ready ✓";
      document.getElementById('loader-msg').style.color = "var(--accent)";
      log("Bridge Engine Ready!", "var(--accent)");
    } else {
      // Diagnostic Log
      log("Diagnostic: Core found? " + !!CoreClass);
      log("Diagnostic: Wallet found? " + !!Web3WalletClass);
      document.getElementById('loader-msg').textContent = "Engine Detection Failed";
    }
  } catch (e) {
    log("Load Error: " + e.message, "var(--danger)");
  }
}

initEngine();

// --- Wallet Discovery ---
window.addEventListener("eip6963:announceProvider", (event) => {
  const info = event.detail.info;
  if (providers.find(p => p.info.uuid === info.uuid)) return;
  providers.push({ info, provider: event.detail.provider });
  updateWalletList();
});
window.dispatchEvent(new Event("eip6963:requestProvider"));

function updateWalletList() {
  const listEl = document.getElementById('wallet-list');
  listEl.innerHTML = '';
  providers.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'wallet-item';
    if (item.info.name.toLowerCase().includes('spell')) div.style.borderColor = 'var(--accent)';
    div.innerHTML = `<img src="${item.info.icon}"> <div style="font-size: 14px; font-weight: bold;">${item.info.name}</div>`;
    div.onclick = () => selectWallet(index);
    listEl.appendChild(div);
  });
}

async function selectWallet(index) {
  selectedProvider = providers[index].provider;
  try {
    const accounts = await selectedProvider.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    document.getElementById('connection-status').textContent = `Connected: ${account.slice(0,12)}...`;
    document.getElementById('btn-pair').disabled = false;
    log("Spell Wallet Linked", "var(--accent)");
  } catch (e) { log("Connection failed: " + e.message, "var(--danger)"); }
}

async function startBridge() {
  if (!CoreClass || !Web3WalletClass) {
    return log("Engine not detected. Please refresh.", "var(--danger)");
  }

  const uri = document.getElementById('wc-uri').value.trim();
  if (!uri) return log("Paste a link first!", "orange");

  log("Starting Relay...");
  try {
    const core = new CoreClass({ projectId: 'a0b855ceefbc43cca5d8e13bdc63a0ac' });
    wcClient = await Web3WalletClass.init({
      core,
      metadata: { name: 'Spell Bridge', description: 'BNB Relay', url: window.location.origin, icons: [] }
    });

    wcClient.on('session_proposal', async (proposal) => {
      log("Proposal received. Handshaking...");
      const namespaces = {
        eip155: {
          accounts: [`eip155:56:${account}`, `eip155:1:${account}`],
          methods: ['eth_sendTransaction', 'personal_sign', 'eth_signTypedData_v4', 'eth_sign'],
          events: ['accountsChanged', 'chainChanged'],
          chains: ['eip155:56', 'eip155:1']
        }
      };
      await wcClient.approveSession({ id: proposal.id, namespaces });
      log("BRIDGE ACTIVE", "var(--accent)");
      document.getElementById('btn-pair').textContent = "✓ Connected";
    });

    wcClient.on('session_request', (event) => {
      pendingRequest = event;
      document.getElementById('req-method').textContent = `Method: ${event.params.request.method}`;
      document.getElementById('pending-box').style.display = 'block';
      log("New Request: " + event.params.request.method, "yellow");
    });

    await wcClient.core.pairing.pair({ uri });
    log("Pairing signal sent...");
  } catch (err) {
    log("Bridge Error: " + err.message, "var(--danger)");
  }
}

async function approveRequest() {
  if (!pendingRequest) return;
  try {
    const result = await selectedProvider.request({
      method: pendingRequest.params.request.method,
      params: pendingRequest.params.request.params
    });
    await wcClient.respondSessionRequest({
      topic: pendingRequest.topic,
      response: { id: pendingRequest.id, jsonrpc: '2.0', result }
    });
    log("Approved!", "var(--accent)");
  } catch (e) { log("Failed: " + e.message, "var(--danger)"); }
  document.getElementById('pending-box').style.display = 'none';
}

async function rejectRequest() {
  if (!pendingRequest) return;
  await wcClient.respondSessionRequest({
    topic: pendingRequest.topic,
    response: { id: pendingRequest.id, jsonrpc: '2.0', error: { code: 4001, message: 'Rejected' } }
  });
  document.getElementById('pending-box').style.display = 'none';
}
</script>
</body>
</html>
