<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bridge Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent: #00ff88; --accent2: #0088ff; --text: #e0e0f0; --muted: #555570; --danger: #ff4466; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .header { text-align: center; margin-bottom: 10px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: block; }
  .wallet-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
  .wallet-item:hover { background: rgba(255,255,255,0.08); }
  .wallet-item.selected { border-color: var(--accent); background: rgba(0,255,136,0.1); }
  .wallet-item img { width: 28px; height: 28px; border-radius: 6px; }
  button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; margin-top: 10px; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 12px; font-family: inherit; font-size: 11px; min-height: 60px; margin-top: 10px; resize: none; }
  .log { font-size: 10px; color: var(--muted); max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-family: monospace; line-height: 1.4; }
  .pending-box { display: none; background: rgba(0,255,136,0.05); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; }
  .relay-status { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Spell Bridge</h1>
    <p style="font-size: 10px; color: var(--muted);">Cross-Protocol Relay System</p>
  </div>

  <div id="relay-msg" class="relay-status">Relay: Initializing...</div>

  <div class="card">
    <span class="card-label">Step 1: Connect Extension</span>
    <div id="wallet-list"><div style="font-size: 12px; color: var(--muted);">Scanning for extensions (EIP-6963)...</div></div>
    <div id="connection-status" style="font-size: 11px; color: var(--accent2); margin-top: 8px; word-break: break-all;"></div>
  </div>

  <div class="card">
    <span class="card-label">Step 2: Bridge to dApp</span>
    <textarea id="wc-uri" placeholder="Paste dApp WalletConnect link (wc:...)"></textarea>
    <button id="btn-pair" disabled>Initialize Bridge Connection</button>
  </div>

  <div id="pending-box" class="pending-box">
    <div style="color: var(--accent); font-weight: bold; margin-bottom: 5px; font-size: 12px;">INCOMING REQUEST</div>
    <div id="req-method" style="font-size: 14px; margin-bottom: 12px; color: white; font-weight: bold;"></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button id="btn-approve" style="background: var(--accent); color: #000;">Sign / Approve</button>
      <button id="btn-reject" style="border-color: var(--danger); color: var(--danger);">Reject</button>
    </div>
  </div>

  <div class="card">
    <span class="card-label">Relay Log</span>
    <div id="log" class="log"></div>
  </div>
</div>

<script type="module">
  import { Core } from "https://esm.sh/@walletconnect/core@2.10.3";
  import { Web3Wallet } from "https://esm.sh/@walletconnect/web3wallet@1.9.3";
  import { buildApprovedNamespaces } from "https://esm.sh/@walletconnect/utils@2.10.3";

  const PROJECT_ID = '86694c6d7377473e04f5ef5e714e12ed';
  let selectedProvider = null;
  let account = null;
  let wcClient = null;
  let pendingRequest = null;
  const providers = [];

  function log(msg, color = '') {
    const el = document.getElementById('log');
    const div = document.createElement('div');
    if(color) div.style.color = color;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  // --- Discovery ---
  window.addEventListener("eip6963:announceProvider", (event) => {
    const info = event.detail.info;
    if (providers.find(p => p.info.uuid === info.uuid)) return;
    providers.push({ info, provider: event.detail.provider });
    updateWalletList();
  });
  window.dispatchEvent(new Event("eip6963:requestProvider"));

  function updateWalletList() {
    const listEl = document.getElementById('wallet-list');
    listEl.innerHTML = '';
    providers.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'wallet-item';
      div.innerHTML = `<img src="${item.info.icon}"> <div><div style="font-size: 14px; font-weight: bold;">${item.info.name}</div><div style="font-size: 9px; color: var(--muted);">${item.info.rdns}</div></div>`;
      div.onclick = () => selectWallet(index);
      listEl.appendChild(div);
    });
  }

  async function selectWallet(index) {
    selectedProvider = providers[index].provider;
    try {
      const accounts = await selectedProvider.request({ method: 'eth_requestAccounts' });
      account = accounts[0];
      document.querySelectorAll('.wallet-item').forEach((el, i) => el.classList.toggle('selected', i === index));
      document.getElementById('connection-status').textContent = `Wallet Active: ${account}`;
      document.getElementById('btn-pair').disabled = false;
      log("Spell Extension Linked", "var(--accent)");
    } catch (e) { log("Extension Connection Refused", "var(--danger)"); }
  }

  // --- Robust Handshake Logic ---
  async function initWC() {
    try {
      const core = new Core({ projectId: PROJECT_ID });
      wcClient = await Web3Wallet.init({
        core,
        metadata: { 
            name: 'Spell Bridge Relay', 
            description: 'Bridge for non-WC extensions', 
            url: window.location.origin, 
            icons: ['https://walletconnect.com/walletconnect-logo.png'] 
        }
      });

      document.getElementById('relay-msg').textContent = "Relay: Ready (Cloud Connected)";
      document.getElementById('relay-msg').style.color = "var(--accent)";

      wcClient.on('session_proposal', async (proposal) => {
        log("DApp Connection Requested...", "yellow");
        
        try {
          // 1. Manually identify which chains the dApp is interested in
          const reqNamespaces = proposal.params.requiredNamespaces || {};
          const optNamespaces = proposal.params.optionalNamespaces || {};
          
          // Get all eip155 chains mentioned in both required and optional
          const reqChains = reqNamespaces.eip155?.chains || [];
          const optChains = optNamespaces.eip155?.chains || [];
          let allChains = [...new Set([...reqChains, ...optChains])];
          
          // Fallback: If they didn't specify any chains, default to BNB (56)
          if (allChains.length === 0) {
              allChains = ['eip155:56'];
          }

          log(`Approval List: ${allChains.join(', ')}`, "#888");

          // 2. MANUALLY build the namespaces object (Bypassing the buggy utility)
          const namespaces = {};
          
          // We only care about eip155 (EVM chains) for the Spell extension
          namespaces.eip155 = {
            accounts: allChains.map(chain => `${chain}:${account}`),
            methods: [
              'eth_sendTransaction', 
              'eth_signTransaction', 
              'personal_sign', 
              'eth_signTypedData', 
              'eth_signTypedData_v4', 
              'eth_sign', 
              'wallet_switchEthereumChain',
              'wallet_addEthereumChain'
            ],
            events: ['accountsChanged', 'chainChanged'],
            chains: allChains
          };

          // 3. Approve the session with our custom object
          await wcClient.approveSession({ 
            id: proposal.id, 
            namespaces: namespaces 
          });

          log("BRIDGE ACTIVE: Connection successful", "var(--accent)");
          document.getElementById('btn-pair').textContent = "✓ Bridge Established";
        } catch (e) {
          console.error("Handshake Crash Detail:", e);
          log("Handshake Error: " + e.message, "var(--danger)");
        }
      });
      
      wcClient.on('session_request', (event) => {
        pendingRequest = event;
        const { method } = event.params.request;
        document.getElementById('req-method').textContent = method;
        document.getElementById('pending-box').style.display = 'block';
        log(`Incoming Request: ${method}`, "white");
        window.focus();
      });

    } catch (err) {
      log("Relay Init Error: " + err.message, "var(--danger)");
    }
  }

  async function startBridge() {
    const uri = document.getElementById('wc-uri').value.trim();
    if (!uri) return log("Error: Paste wc: link from dApp", "var(--danger)");
    
    log("Attempting to pair with dApp relay...");
    try {
      await wcClient.core.pairing.pair({ uri });
      log("Pairing signal sent. Waiting for dApp response...");
    } catch (err) {
      log("Pairing Failed: " + err.message, "var(--danger)");
    }
  }

  async function approveRequest() {
    if (!pendingRequest) return;
    try {
      log("Forwarding to Spell Extension...");
      
      // Standardize params for the extension
      const result = await selectedProvider.request({
        method: pendingRequest.params.request.method,
        params: pendingRequest.params.request.params
      });
      
      await wcClient.respondSessionRequest({
        topic: pendingRequest.topic,
        response: { id: pendingRequest.id, jsonrpc: '2.0', result }
      });
      log("Success: Response sent to dApp", "var(--accent)");
    } catch (e) { 
        log("Extension Denied: " + e.message, "var(--danger)"); 
        await wcClient.respondSessionRequest({
            topic: pendingRequest.topic,
            response: { id: pendingRequest.id, jsonrpc: '2.0', error: { code: 4001, message: e.message } }
        });
    }
    document.getElementById('pending-box').style.display = 'none';
    pendingRequest = null;
  }

  async function rejectRequest() {
    if (!pendingRequest) return;
    await wcClient.respondSessionRequest({
      topic: pendingRequest.topic,
      response: { id: pendingRequest.id, jsonrpc: '2.0', error: { code: 4001, message: 'User Rejected' } }
    });
    document.getElementById('pending-box').style.display = 'none';
    log("Request Cancelled.");
    pendingRequest = null;
  }

  initWC();
  document.getElementById('btn-pair').onclick = startBridge;
  document.getElementById('btn-approve').onclick = approveRequest;
  document.getElementById('btn-reject').onclick = rejectRequest;
</script>
</body>
</html>
