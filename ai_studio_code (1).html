<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Bridge Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent: #00ff88; --accent2: #0088ff; --text: #e0e0f0; --muted: #555570; --danger: #ff4466; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .header { text-align: center; margin-bottom: 10px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .card-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: block; }
  
  /* Wallet List Styling */
  .wallet-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .wallet-item { 
    display: flex; align-items: center; gap: 12px; padding: 12px; 
    background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
    border-radius: 10px; cursor: pointer; transition: 0.2s;
  }
  .wallet-item:hover { border-color: var(--accent); background: rgba(0,255,136,0.05); }
  .wallet-item img { width: 28px; height: 28px; border-radius: 6px; }
  .wallet-item.selected { border-color: var(--accent); background: rgba(0,255,136,0.1); }
  
  button { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; margin-top: 10px; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 12px; font-family: inherit; font-size: 12px; min-height: 80px; margin-top: 10px; }
  .log { font-size: 10px; color: var(--muted); max-height: 100px; overflow-y: auto; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .status-badge { font-size: 12px; color: var(--accent); margin-top: 5px; display: block; }
  .pending-box { display: none; background: rgba(255,68,102,0.1); border: 1px solid var(--danger); padding: 15px; border-radius: 12px; margin-top: 15px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Spell Bridge</h1>
    <p style="font-size: 10px; color: var(--muted);">EIP-6963 Multi-Injection Discovery</p>
  </div>

  <!-- Step 1: Discovery -->
  <div class="card">
    <span class="card-label">Step 1: Select Spell Wallet</span>
    <div id="wallet-list" class="wallet-list">
      <div style="font-size: 12px; color: var(--muted);">Scanning for extensions...</div>
    </div>
    <div id="connection-status" class="status-badge"></div>
  </div>

  <!-- Step 2: Bridge -->
  <div class="card">
    <span class="card-label">Step 2: Connect dApp Link</span>
    <textarea id="wc-uri" placeholder="Paste wc: link here..."></textarea>
    <button id="btn-pair" onclick="startBridge()" disabled>Initialize Bridge</button>
  </div>

  <!-- Request UI -->
  <div id="pending-box" class="pending-box">
    <div style="color: var(--danger); font-weight: bold; margin-bottom: 10px;">Action Required in Spell</div>
    <div id="req-method" style="font-size: 12px; margin-bottom: 10px;"></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button onclick="approveRequest()">Approve</button>
      <button style="border-color: var(--danger); color: var(--danger);" onclick="rejectRequest()">Reject</button>
    </div>
  </div>

  <div class="card">
    <span class="card-label">Activity Log</span>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
let selectedProvider = null;
let account = null;
let wcClient = null;
let pendingRequest = null;
const providers = [];

function log(msg, color = '') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  if(color) div.style.color = color;
  div.textContent = `> ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// --- EIP-6963 Discovery Engine ---
window.addEventListener("eip6963:announceProvider", (event) => {
  const info = event.detail.info;
  const provider = event.detail.provider;
  
  // Prevent duplicates
  if (providers.find(p => p.info.uuid === info.uuid)) return;
  
  providers.push({ info, provider });
  updateWalletList();
  log(`Found: ${info.name}`);
});

// Trigger discovery
window.dispatchEvent(new Event("eip6963:requestProvider"));

// Fallback for older injection
setTimeout(() => {
  if (window.ethereum && !providers.find(p => p.provider === window.ethereum)) {
    providers.push({ 
      info: { name: "Injected Wallet", icon: "https://cdn-icons-png.flaticon.com/512/10149/10149458.png", uuid: 'legacy' }, 
      provider: window.ethereum 
    });
    updateWalletList();
  }
}, 1000);

function updateWalletList() {
  const listEl = document.getElementById('wallet-list');
  listEl.innerHTML = '';
  
  providers.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'wallet-item';
    if (item.info.name.toLowerCase().includes('spell')) div.style.borderColor = 'var(--accent)';
    
    div.innerHTML = `
      <img src="${item.info.icon}" alt="${item.info.name}">
      <div style="flex:1">
        <div style="font-size: 14px; font-weight: bold;">${item.info.name}</div>
        <div style="font-size: 10px; color: var(--muted);">${item.info.rdns || 'Extension'}</div>
      </div>
    `;
    div.onclick = () => selectWallet(index);
    listEl.appendChild(div);
  });
}

async function selectWallet(index) {
  const items = document.querySelectorAll('.wallet-item');
  items.forEach(i => i.classList.remove('selected'));
  items[index].classList.add('selected');
  
  selectedProvider = providers[index].provider;
  
  try {
    log(`Connecting to ${providers[index].info.name}...`);
    const accounts = await selectedProvider.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    document.getElementById('connection-status').textContent = `Connected: ${account.slice(0,6)}...${account.slice(-4)}`;
    document.getElementById('btn-pair').disabled = false;
    log("Wallet Linked!", "var(--accent)");
  } catch (e) {
    log("Connection failed: " + e.message, "var(--danger)");
  }
}

// --- WalletConnect Bridge ---
async function startBridge() {
  const uri = document.getElementById('wc-uri').value.trim();
  if (!uri) return;

  log("Starting WalletConnect Relay...");
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@walletconnect/web3wallet@1.13.2/dist/index.umd.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@walletconnect/core@2.17.3/dist/index.umd.js');

    const core = new window.WalletConnectCore.Core({ projectId: 'a0b855ceefbc43cca5d8e13bdc63a0ac' });
    wcClient = await window.WalletConnectWeb3Wallet.Web3Wallet.init({
      core,
      metadata: { name: 'Spell Bridge', description: 'Mises Relay', url: window.location.href, icons: [] }
    });

    wcClient.on('session_proposal', async (proposal) => {
      const namespaces = {
        eip155: {
          accounts: [`eip155:56:${account}`],
          methods: ['eth_sendTransaction', 'personal_sign', 'eth_signTypedData_v4', 'eth_sign'],
          events: ['accountsChanged', 'chainChanged'],
          chains: ['eip155:56']
        }
      };
      await wcClient.approveSession({ id: proposal.id, namespaces });
      log("Bridge Active: dApp connected to Spell", "var(--accent)");
      document.getElementById('btn-pair').textContent = "✓ Bridge Active";
    });

    wcClient.on('session_request', (event) => {
      pendingRequest = event;
      document.getElementById('req-method').textContent = `Method: ${event.params.request.method}`;
      document.getElementById('pending-box').style.display = 'block';
      log("Request received: " + event.params.request.method);
    });

    await wcClient.core.pairing.pair({ uri });
  } catch (err) {
    log("Bridge Error: " + err.message, "var(--danger)");
  }
}

async function approveRequest() {
  if (!pendingRequest) return;
  try {
    const result = await selectedProvider.request({
      method: pendingRequest.params.request.method,
      params: pendingRequest.params.request.params
    });
    await wcClient.respondSessionRequest({
      topic: pendingRequest.topic,
      response: { id: pendingRequest.id, jsonrpc: '2.0', result }
    });
    log("Request Approved", "var(--accent)");
  } catch (e) {
    log("Request Failed: " + e.message, "var(--danger)");
  }
  document.getElementById('pending-box').style.display = 'none';
}

async function rejectRequest() {
  if (!pendingRequest) return;
  await wcClient.respondSessionRequest({
    topic: pendingRequest.topic,
    response: { id: pendingRequest.id, jsonrpc: '2.0', error: { code: 4001, message: 'User Rejected' } }
  });
  document.getElementById('pending-box').style.display = 'none';
  log("Request Rejected");
}

function loadScript(src) {
  return new Promise(r => { const s = document.createElement('script'); s.src = src; s.onload = r; document.head.appendChild(s); });
}
</script>
</body>
</html>
